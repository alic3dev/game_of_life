name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["core"]
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - name: checkout_game_of_life
        uses: actions/checkout@v4
        with:
          path: game_of_life
      - name: checkout_cer0
        uses: actions/checkout@v4
        with:
          repository: alic3dev/cer0
          path: cer0
      - name: checkout_cexil
        uses: actions/checkout@v4
        with:
          repository: alic3dev/cexil
          path: cexil
      - name: checkout_clic3
        uses: actions/checkout@v4
        with:
          repository: alic3dev/clic3
          path: clic3
      - name: checkout_interrupt_handler
        uses: actions/checkout@v4
        with:
          repository: alic3dev/interrupt_handler
          path: interrupt_handler
      - name: checkout_math_c
        uses: actions/checkout@v4
        with:
          repository: alic3dev/math_c
          path: math_c
      - name: checkout_metil
        uses: actions/checkout@v4
        with:
          repository: alic3dev/metil
          path: metil
      - name: make_cer0
        run: cd cer0 && make
      - name: make_cexil
        run: cd cexil && make
      - name: make_clic3
        run: cd clic3 && make
      - name: make_interrupt_handler
        run: cd interrupt_handler && make
      - name: make_math_c
        run: cd math_c && make
      - name: make_metil
        run: cd metil && make
      - name: make_game_of_life_2d
        run: cd game_of_life && make debug=0 rendering_mode=2d with_metal=0
      - name: make_game_of_life_clean
        run: cd game_of_life && make clean
      - name: make_game_of_life_2d_with_metal
        run: cd game_of_life && make debug=0 rendering_mode=2d with_metal=1
      - name: make_game_of_life_clean
        run: cd game_of_life && make clean
      - name: make_game_of_life_3d
        run: cd game_of_life && make debug=0 rendering_mode=3d with_metal=0
      - name: make_game_of_life_clean
        run: cd game_of_life && make clean
      - name: make_game_of_life_3d_with_metal
        run: cd game_of_life && make debug=0 rendering_mode=3d with_metal=1
